<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMF Bitmap Font Tester</title>
<style>
:root {
    color-scheme: dark;
    --bg: #101010;
    --panel: #181818;
    --panel-2: #202020;
    --border: #303030;
    --text: #f2f2f2;
    --muted: #a8b0b8;
    --accent: #00ff96;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
main {
    width: min(1200px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 24px 0 32px;
}
h1 { margin: 0 0 8px; font-size: 24px; }
p { margin: 0 0 16px; color: var(--muted); line-height: 1.45; }
.controls {
    display: grid;
    grid-template-columns: 1fr minmax(220px, 280px) repeat(4, auto);
    gap: 8px;
    margin-bottom: 12px;
}
input, select, button {
    min-height: 40px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel-2);
    color: var(--text);
    padding: 0 12px;
    font: inherit;
}
button { cursor: pointer; }
button:hover { border-color: #505050; }
canvas, .bitmap-preview img {
    display: block;
    width: 100%;
    min-height: 420px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #000;
}
.bitmap-preview {
    margin-top: 16px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
}
.bitmap-preview h2 {
    margin: 0 0 8px;
    font-size: 16px;
}
.bitmap-preview img {
    width: auto;
    max-width: 100%;
    min-height: 0;
    image-rendering: pixelated;
}
.meta {
    margin-top: 12px;
    white-space: pre-wrap;
    font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    color: #d7e0e8;
}
.warning {
    display: none;
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid #6a4d13;
    border-radius: 8px;
    background: #1f1708;
    color: #ffdd8a;
}
@media (max-width: 900px) {
    .controls { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main>
    <h1>BMF Bitmap Font Tester</h1>
    <p>Loads generated binary font files directly. Source BMF and JSON dist files are kept beside the binary output.</p>

    <div id="warning" class="warning"></div>

    <div class="controls">
        <input id="textInput" type="text" value="Hello ASCII! Ola, acao, Sao, cafe, coracao, 123." spellcheck="false">
        <select id="fontSelect"></select>
        <button id="drawButton" type="button">Draw</button>
        <button id="asciiButton" type="button">ASCII atlas</button>
        <button id="latinButton" type="button">Latin-1 atlas</button>
        <button id="clearButton" type="button">Clear</button>
    </div>

    <canvas id="fontCanvas" width="1600" height="640"></canvas>

    <section class="bitmap-preview">
        <h2>Generated 8-bit BMP byte atlas</h2>
        <img id="bitmapAtlas" alt="Selected font BMP byte atlas">
    </section>

    <div id="meta" class="meta"></div>
</main>

<script type="module">
import { DEFAULT_PAGE, loadBitmapFont, getBitmapGlyph, hasFullCoverage } from './src/bitmap-font-loader.mjs';

const FONT_SOURCES = [
    { id: 'font_terminal_ascii_5x7', label: 'Terminal ASCII 5x7', path: 'binary/font_terminal_ascii_5x7.bin', bitmap: 'bitmap/font_terminal_ascii_5x7.bmp' },
    { id: 'font_terminal_latin1_8x12', label: 'Terminal Latin-1 8x12', path: 'binary/font_terminal_latin1_8x12.bin', bitmap: 'bitmap/font_terminal_latin1_8x12.bmp' }
];

const state = {
    fonts: new Map(),
    selectedFontId: 'font_terminal_latin1_8x12',
    cellSize: 5,
    color: '#00ff96'
};

const canvas = document.getElementById('fontCanvas');
const ctx = canvas.getContext('2d');
const textInput = document.getElementById('textInput');
const fontSelect = document.getElementById('fontSelect');
const meta = document.getElementById('meta');
const warning = document.getElementById('warning');
const bitmapAtlas = document.getElementById('bitmapAtlas');

function showWarning(message) {
    warning.textContent = message;
    warning.style.display = 'block';
}

function clearWarning() {
    warning.textContent = '';
    warning.style.display = 'none';
}

async function loadFonts() {
    for (const entry of FONT_SOURCES) {
        const font = await loadBitmapFont(entry.path);
        state.fonts.set(font.id, font);
    }
    rebuildFontSelect();
    updateBitmapAtlas();
    drawText(textInput.value);
}

function rebuildFontSelect() {
    fontSelect.innerHTML = '';
    for (const entry of FONT_SOURCES) {
        const font = state.fonts.get(entry.id);
        if (!font) continue;
        const option = document.createElement('option');
        option.value = font.id;
        option.textContent = font.label;
        fontSelect.appendChild(option);
    }
    fontSelect.value = state.selectedFontId;
}

function getSelectedFont() {
    return state.fonts.get(fontSelect.value) || state.fonts.get(state.selectedFontId) || null;
}

function updateBitmapAtlas() {
    const selected = FONT_SOURCES.find((entry) => entry.id === fontSelect.value) || FONT_SOURCES[0];
    bitmapAtlas.src = selected ? selected.bitmap : '';
}

function getCodePoints(text) {
    return Array.from(text).map((char) => char.codePointAt(0));
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawGlyph(glyph, x, y) {
    ctx.fillStyle = state.color;
    for (let row = 0; row < glyph.length; row += 1) {
        const bits = glyph[row];
        for (let col = 0; col < bits.length; col += 1) {
            if (bits[col] === '1') {
                ctx.fillRect(
                    x + col * state.cellSize,
                    y + row * state.cellSize,
                    state.cellSize - 1,
                    state.cellSize - 1
                );
            }
        }
    }
}

function drawText(text) {
    clearWarning();
    const font = getSelectedFont();
    if (!font) {
        showWarning('No font is loaded yet.');
        return;
    }

    clearCanvas();
    const codes = getCodePoints(text);
    let x = 24;
    let y = 40;
    const advance = font.advance * state.cellSize;
    const lineHeight = (font.height + 2) * state.cellSize;
    const maxX = canvas.width - advance;
    let outOfRange = 0;

    for (const codePoint of codes) {
        if (codePoint === 10) {
            x = 24;
            y += lineHeight;
            continue;
        }
        if (x > maxX) {
            x = 24;
            y += lineHeight;
        }
        if (codePoint > 255) outOfRange += 1;
        drawGlyph(getBitmapGlyph(font, codePoint), x, y);
        x += advance;
    }

    meta.textContent = [
        `Page: ${DEFAULT_PAGE}`,
        `Font: ${font.label}`,
        `Font ID: ${font.id}`,
        `Encoding: ${font.encoding}`,
        `Cell: ${font.width}x${font.height}`,
        `Advance: ${font.advance}`,
        `Input code points: ${codes.join(', ')}`,
        `0..127 coverage: ${hasFullCoverage(font, 0, 127) ? 'yes' : 'no'}`,
        `0..255 coverage: ${hasFullCoverage(font, 0, 255) ? 'yes' : 'no'}`,
        `Out-of-range fallback count: ${outOfRange}`
    ].join('\n');
}

function drawAtlas(start, end) {
    clearWarning();
    const font = getSelectedFont();
    if (!font) return;

    clearCanvas();
    const cols = 16;
    const cellW = Math.max(48, (font.width + 4) * state.cellSize);
    const cellH = Math.max(56, (font.height + 5) * state.cellSize);
    const labelOffset = font.height * state.cellSize + 14;
    ctx.font = '12px ui-monospace, monospace';
    ctx.textBaseline = 'top';

    for (let codePoint = start; codePoint <= end; codePoint += 1) {
        const index = codePoint - start;
        const col = index % cols;
        const row = Math.floor(index / cols);
        const x = 16 + col * cellW;
        const y = 16 + row * cellH;

        drawGlyph(getBitmapGlyph(font, codePoint), x, y);
        ctx.fillStyle = '#8b949e';
        ctx.fillText(`0x${codePoint.toString(16).toUpperCase().padStart(2, '0')}`, x, y + labelOffset);
    }

    meta.textContent = [
        `Page: ${DEFAULT_PAGE}`,
        `Font: ${font.label}`,
        `Atlas range: ${start}..${end}`,
        `0..127 coverage: ${hasFullCoverage(font, 0, 127) ? 'yes' : 'no'}`,
        `0..255 coverage: ${hasFullCoverage(font, 0, 255) ? 'yes' : 'no'}`
    ].join('\n');
}

fontSelect.addEventListener('change', () => {
    state.selectedFontId = fontSelect.value;
    updateBitmapAtlas();
    drawText(textInput.value);
});
document.getElementById('drawButton').addEventListener('click', () => drawText(textInput.value));
document.getElementById('asciiButton').addEventListener('click', () => drawAtlas(32, 127));
document.getElementById('latinButton').addEventListener('click', () => drawAtlas(160, 255));
document.getElementById('clearButton').addEventListener('click', clearCanvas);
textInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') drawText(textInput.value);
});

loadFonts().catch((error) => {
    showWarning(`Automatic binary font loading failed: ${error.message}`);
});
</script>
</body>
</html>
