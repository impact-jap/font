<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Bitmap Font Tester</title>
<style>
:root {
    color-scheme: dark;
    --bg: #101010;
    --panel: #181818;
    --panel-2: #202020;
    --border: #303030;
    --text: #f2f2f2;
    --muted: #a8b0b8;
    --accent: #00ff96;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
main {
    width: min(1200px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 24px 0 32px;
}
h1 { margin: 0 0 8px; font-size: 24px; }
p { margin: 0 0 16px; color: var(--muted); line-height: 1.45; }
.controls {
    display: grid;
    grid-template-columns: 1fr minmax(220px, 280px) repeat(4, auto);
    gap: 8px;
    margin-bottom: 12px;
}
input, select, button {
    min-height: 40px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel-2);
    color: var(--text);
    padding: 0 12px;
    font: inherit;
}
button { cursor: pointer; }
button:hover { border-color: #505050; }
canvas {
    display: block;
    width: 100%;
    min-height: 420px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #000;
}
.meta {
    margin-top: 12px;
    white-space: pre-wrap;
    font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    color: #d7e0e8;
}
.warning {
    display: none;
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid #6a4d13;
    border-radius: 8px;
    background: #1f1708;
    color: #ffdd8a;
}
.file-loader {
    display: none;
    margin-bottom: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
}
.file-loader input { width: 100%; padding-top: 8px; }
@media (max-width: 900px) {
    .controls { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main>
    <h1>Terminal Bitmap Font Tester</h1>
    <p>Loads bitmap fonts from external JSON files, supports local and web paths, and renders byte-oriented 0..255 font sets.</p>

    <div id="warning" class="warning"></div>
    <div id="fileLoader" class="file-loader">
        <p>Local JSON fetch was blocked by the browser. Select the JSON font files from the <code>fonts</code> folder to test them without a server.</p>
        <input id="fontFiles" type="file" accept="application/json,.json" multiple>
    </div>

    <div class="controls">
        <input id="textInput" type="text" value="Olá, ação, São, café, coração, ¿Qué tal? ½ ¼ © ® °" spellcheck="false">
        <select id="fontSelect"></select>
        <button id="drawButton" type="button">Draw</button>
        <button id="asciiButton" type="button">ASCII atlas</button>
        <button id="latinButton" type="button">Latin-1 atlas</button>
        <button id="clearButton" type="button">Clear</button>
    </div>

    <canvas id="fontCanvas" width="1600" height="640"></canvas>
    <div id="meta" class="meta"></div>
</main>

<script>
'use strict';

const DEFAULT_PAGE = window.location.protocol + '//' + window.location.hostname + window.location.pathname;
const BASE_URL = new URL('.', window.location.href);
const MANIFEST_URL = new URL('fonts/manifest.json', BASE_URL).href;

const state = {
    fonts: new Map(),
    manifest: null,
    selectedFontId: null,
    cellSize: 5,
    color: '#00ff96'
};

const canvas = document.getElementById('fontCanvas');
const ctx = canvas.getContext('2d');
const textInput = document.getElementById('textInput');
const fontSelect = document.getElementById('fontSelect');
const meta = document.getElementById('meta');
const warning = document.getElementById('warning');
const fileLoader = document.getElementById('fileLoader');
const fontFiles = document.getElementById('fontFiles');

function showWarning(message) {
    warning.textContent = message;
    warning.style.display = 'block';
}

function clearWarning() {
    warning.textContent = '';
    warning.style.display = 'none';
}

async function fetchJson(url) {
    const response = await fetch(url, { cache: 'no-cache' });
    if (!response.ok) {
        throw new Error(`HTTP ${response.status} while loading ${url}`);
    }
    return response.json();
}

async function loadFromManifest() {
    const manifest = await fetchJson(MANIFEST_URL);
    state.manifest = manifest;

    for (const entry of manifest.fonts) {
        const url = new URL(entry.path, BASE_URL).href;
        const font = await fetchJson(url);
        state.fonts.set(font.id, font);
    }

    state.selectedFontId = manifest.defaultFont;
    rebuildFontSelect();
    drawText(textInput.value);
}

function rebuildFontSelect() {
    fontSelect.innerHTML = '';
    const fonts = Array.from(state.fonts.values()).sort((a, b) => a.label.localeCompare(b.label));
    for (const font of fonts) {
        const option = document.createElement('option');
        option.value = font.id;
        option.textContent = font.label;
        fontSelect.appendChild(option);
    }
    if (state.selectedFontId && state.fonts.has(state.selectedFontId)) {
        fontSelect.value = state.selectedFontId;
    }
}

function getSelectedFont() {
    return state.fonts.get(fontSelect.value) || state.fonts.get(state.selectedFontId) || null;
}

function codePoints(text) {
    return Array.from(text).map((char) => char.codePointAt(0));
}

function getGlyph(font, codePoint) {
    if (!font) return null;
    const direct = font.glyphs[String(codePoint)];
    if (direct) return direct;

    if (codePoint > 255) {
        return font.glyphs[String(font.fallback || 63)] || font.blank;
    }

    return font.blank;
}

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawGlyph(font, glyph, x, y) {
    ctx.fillStyle = state.color;
    for (let row = 0; row < glyph.length; row++) {
        const bits = glyph[row];
        for (let col = 0; col < bits.length; col++) {
            if (bits[col] === '1') {
                ctx.fillRect(
                    x + col * state.cellSize,
                    y + row * state.cellSize,
                    state.cellSize - 1,
                    state.cellSize - 1
                );
            }
        }
    }
}

function drawText(text) {
    const font = getSelectedFont();
    if (!font) {
        showWarning('No font is loaded yet.');
        return;
    }

    clearCanvas();
    const codes = codePoints(text);
    let x = 24;
    let y = 40;
    const advance = font.advance * state.cellSize;
    const lineHeight = (font.height + 2) * state.cellSize;
    const maxX = canvas.width - advance;
    let outOfRange = 0;

    for (const code of codes) {
        if (code === 10) {
            x = 24;
            y += lineHeight;
            continue;
        }
        if (x > maxX) {
            x = 24;
            y += lineHeight;
        }
        if (code > 255) outOfRange++;
        drawGlyph(font, getGlyph(font, code), x, y);
        x += advance;
    }

    meta.textContent = [
        `Page: ${DEFAULT_PAGE}`,
        `Font: ${font.label}`,
        `Font ID: ${font.id}`,
        `Encoding: ${font.encoding}`,
        `Cell: ${font.width}x${font.height}`,
        `Advance: ${font.advance}`,
        `Input code points: ${codes.join(', ')}`,
        `0..255 coverage: ${hasFullByteCoverage(font) ? 'yes' : 'no'}`,
        `Out-of-range fallback count: ${outOfRange}`
    ].join('\n');
}

function hasFullByteCoverage(font) {
    for (let code = 0; code <= 255; code++) {
        if (!font.glyphs[String(code)]) return false;
    }
    return true;
}

function drawAtlas(start, end) {
    const font = getSelectedFont();
    if (!font) return;

    clearCanvas();
    const cols = 16;
    const cellW = Math.max(48, (font.width + 4) * state.cellSize);
    const cellH = Math.max(56, (font.height + 5) * state.cellSize);
    const labelOffset = font.height * state.cellSize + 14;
    ctx.font = '12px ui-monospace, monospace';
    ctx.textBaseline = 'top';

    for (let code = start; code <= end; code++) {
        const index = code - start;
        const col = index % cols;
        const row = Math.floor(index / cols);
        const x = 16 + col * cellW;
        const y = 16 + row * cellH;

        drawGlyph(font, getGlyph(font, code), x, y);
        ctx.fillStyle = '#8b949e';
        ctx.fillText(String(code).padStart(3, '0'), x, y + labelOffset);
    }

    meta.textContent = [
        `Page: ${DEFAULT_PAGE}`,
        `Font: ${font.label}`,
        `Atlas range: ${start}..${end}`,
        `0..255 coverage: ${hasFullByteCoverage(font) ? 'yes' : 'no'}`
    ].join('\n');
}

function readFileAsText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file, 'utf-8');
    });
}

fontFiles.addEventListener('change', async () => {
    clearWarning();
    for (const file of fontFiles.files) {
        try {
            const json = JSON.parse(await readFileAsText(file));
            if (json.schema === 'bitmap-font/v1' && json.id) {
                state.fonts.set(json.id, json);
            }
        } catch (error) {
            showWarning(`Could not load ${file.name}: ${error.message}`);
        }
    }
    if (!state.selectedFontId && state.fonts.size > 0) {
        state.selectedFontId = Array.from(state.fonts.keys())[0];
    }
    rebuildFontSelect();
    drawText(textInput.value);
});

fontSelect.addEventListener('change', () => drawText(textInput.value));
document.getElementById('drawButton').addEventListener('click', () => drawText(textInput.value));
document.getElementById('asciiButton').addEventListener('click', () => drawAtlas(32, 127));
document.getElementById('latinButton').addEventListener('click', () => drawAtlas(160, 255));
document.getElementById('clearButton').addEventListener('click', clearCanvas);
textInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') drawText(textInput.value);
});

loadFromManifest().catch((error) => {
    fileLoader.style.display = 'block';
    showWarning(`Automatic JSON loading failed: ${error.message}`);
});
</script>
</body>
</html>
